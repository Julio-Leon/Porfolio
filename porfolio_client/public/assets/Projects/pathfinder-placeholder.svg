<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#46b8a7;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Grid -->
  <g stroke="url(#gridGradient)" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="800" y2="0" />
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="350" x2="800" y2="350" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="450" x2="800" y2="450" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="0" y1="550" x2="800" y2="550" />
    
    <line x1="0" y1="0" x2="0" y2="600" />
    <line x1="50" y1="0" x2="50" y2="600" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="250" y1="0" x2="250" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="350" y1="0" x2="350" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="450" y1="0" x2="450" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="550" y1="0" x2="550" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="650" y1="0" x2="650" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
    <line x1="750" y1="0" x2="750" y2="600" />
    <line x1="800" y1="0" x2="800" y2="600" />
  </g>
  
  <!-- Start point (green) -->
  <circle cx="100" cy="100" r="20" fill="#00ff00" opacity="0.8"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#00ff00" stroke-width="2" opacity="0.5">
    <animate attributeName="r" from="20" to="30" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- End point (red) -->
  <circle cx="700" cy="500" r="20" fill="#ff0000" opacity="0.8"/>
  <circle cx="700" cy="500" r="20" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.5">
    <animate attributeName="r" from="20" to="30" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Pathfinding line -->
  <polyline points="100,100 200,150 300,200 400,250 500,300 600,400 700,500" 
            stroke="#46b8a7" stroke-width="3" fill="none" opacity="0.7"
            stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="3s" repeatCount="indefinite" />
  </polyline>
  
  <!-- Obstacles -->
  <rect x="400" y="300" width="40" height="40" fill="#ff6b35" opacity="0.6"/>
  <rect x="200" y="400" width="50" height="30" fill="#ff6b35" opacity="0.6"/>
  
  <!-- Title -->
  <text x="400" y="570" font-size="32" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Pathfinder Visualizer
  </text>
</svg>