<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient2)"/>
  
  <!-- Top header bar -->
  <rect y="0" width="800" height="60" fill="#1e40af" opacity="0.6"/>
  
  <!-- Lock icon (security) -->
  <g transform="translate(50, 20)">
    <rect x="5" y="10" width="20" height="15" rx="2" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="15" y1="10" x2="15" y2="5" stroke="#10b981" stroke-width="2"/>
    <circle cx="15" cy="17" r="2" fill="#10b981"/>
  </g>
  
  <!-- Title text -->
  <text x="100" y="42" font-size="24" font-weight="bold" fill="white" font-family="Arial">
    Préstamos León
  </text>
  
  <!-- Dashboard cards -->
  <!-- Card 1: Total Loans -->
  <rect x="40" y="100" width="200" height="140" rx="10" fill="url(#cardGradient)" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="130" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">Total Loans</text>
  <text x="130" y="160" font-size="32" font-weight="bold" fill="#10b981" text-anchor="middle" font-family="Arial">$125K</text>
  <rect x="50" y="175" width="180" height="3" fill="#10b981" opacity="0.5"/>
  <text x="130" y="210" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Active Accounts</text>
  
  <!-- Card 2: Clients -->
  <rect x="300" y="100" width="200" height="140" rx="10" fill="url(#cardGradient)" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="130" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">Clients</text>
  <text x="400" y="160" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle" font-family="Arial">48</text>
  <rect x="310" y="175" width="180" height="3" fill="#f59e0b" opacity="0.5"/>
  <text x="400" y="210" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Active Clients</text>
  
  <!-- Card 3: Pending -->
  <rect x="560" y="100" width="200" height="140" rx="10" fill="url(#cardGradient)" stroke="#3b82f6" stroke-width="2"/>
  <text x="660" y="130" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">Pending</text>
  <text x="660" y="160" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle" font-family="Arial">$42K</text>
  <rect x="570" y="175" width="180" height="3" fill="#ef4444" opacity="0.5"/>
  <text x="660" y="210" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Pending Payments</text>
  
  <!-- Bar Chart -->
  <g transform="translate(40, 300)">
    <text x="280" y="-10" font-size="16" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Monthly Overview</text>
    
    <!-- Chart bars -->
    <rect x="20" y="80" width="30" height="60" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" from="0" to="60" dur="1s" begin="0s" />
    </rect>
    <rect x="60" y="70" width="30" height="70" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" from="0" to="70" dur="1s" begin="0.1s" />
    </rect>
    <rect x="100" y="50" width="30" height="90" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" from="0" to="90" dur="1s" begin="0.2s" />
    </rect>
    <rect x="140" y="60" width="30" height="80" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" from="0" to="80" dur="1s" begin="0.3s" />
    </rect>
    <rect x="180" y="40" width="30" height="100" fill="#10b981" opacity="0.8">
      <animate attributeName="height" from="0" to="100" dur="1s" begin="0.4s" />
    </rect>
    <rect x="220" y="55" width="30" height="85" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" from="0" to="85" dur="1s" begin="0.5s" />
    </rect>
    
    <!-- Axis -->
    <line x1="10" y1="150" x2="270" y2="150" stroke="#475569" stroke-width="2"/>
    <line x1="10" y1="10" x2="10" y2="150" stroke="#475569" stroke-width="2"/>
    
    <!-- Month labels -->
    <text x="35" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">Jan</text>
    <text x="75" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">Feb</text>
    <text x="115" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">Mar</text>
    <text x="155" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">Apr</text>
    <text x="195" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">May</text>
    <text x="235" y="170" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="Arial">Jun</text>
  </g>
  
  <!-- Bottom footer info -->
  <rect y="540" width="800" height="60" fill="#1e40af" opacity="0.3"/>
  <text x="400" y="570" font-size="20" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Préstamos León - Lending Management System
  </text>
</svg>